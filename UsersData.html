<div id="usersListView" class="container" style="display: none;">
  <button class="btn-dash-back" onclick="switchView('dashboardView')">&#8592; Back to Dashboard</button>
  
  <div class="view-header-bar" style="margin-bottom: 20px;">
    <h2>User Management</h2>
    <button class="btn-primary" onclick="openAddUserForm()">+ Add User</button>
  </div>

  <div class="filter-wrapper">
    <input type="text" id="user-filter-search" class="filter-input" placeholder="Search users..." onkeyup="applyUserFilters()">
    <button class="btn-filter-toggle" onclick="toggleFilter('user-adv')">Filters</button>
    <div id="user-adv" class="filter-advanced" style="display:none;">
      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('user-status-drop')">Status ▼</button>
        <div class="dropdown-content" id="user-status-drop">
          <label><input type="checkbox" class="user-filter-status-cb" value="Active" checked onchange="applyUserFilters()"> Active</label>
          <label><input type="checkbox" class="user-filter-status-cb" value="Inactive" onchange="applyUserFilters()"> Inactive</label>
        </div>
      </div>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Name</th>
          <th>Work Email</th>
          <th>Role</th>
          <th>Position</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTableBody">
        <tr><td colspan="7" style="text-align:center; padding: 20px;">Loading users...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  /* --- UI HELPERS & IMAGE FIX --- */
  var DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 32 32' fill='%23cccccc'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

  /** * Transforms Drive URLs into thumbnail links for cross-origin rendering.
   * Ensures profile photos show up in the hub.
   * @param {string} url - The raw Drive link from the sheet.
   */
  function getDirectImgUrl(url) {
    if (!url || !url.includes("drive.google.com")) return url || DEFAULT_AVATAR;
    try {
      var id = url.match(/[-\w]{25,}/);
      if (id) return "https://drive.google.com/thumbnail?id=" + id[0] + "&sz=w500";
    } catch (e) { return url || DEFAULT_AVATAR; }
    return url || DEFAULT_AVATAR;
  }

  /** Toggles accordion panels */
  function toggleAccordion(element) {
    element.classList.toggle("active");
    var panel = element.nextElementSibling;
    panel.style.display = (panel.style.display === "block") ? "none" : "block";
  }

  /** Resets accordion panels so only the first one is open */
  function resetAccordions(viewId) {
    var view = document.getElementById(viewId);
    if (!view) return;
    var accordions = view.querySelectorAll('.accordion');
    var panels = view.querySelectorAll('.panel');
    for (var i = 0; i < accordions.length; i++) {
      if (i === 0) {
        accordions[i].classList.add('active');
        panels[i].style.display = 'block';
      } else {
        accordions[i].classList.remove('active');
        panels[i].style.display = 'none';
      }
    }
  }

  /** Formats date strings for HTML inputs */
  function safelyFormatDate(dateStr) {
    if (!dateStr) return "";
    try {
      var d = new Date(dateStr);
      if (isNaN(d.getTime())) return "";
      return d.toISOString().split('T')[0];
    } catch(e) { return ""; }
  }

  /** Real-time photo preview */
  function previewPhoto(input, previewId) {
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) { document.getElementById(previewId).src = e.target.result; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  /* --- DATA FETCHING & RENDERING --- */
  
  var GLOBAL_USER_DATA = [];

  /** Success handler for users fetch */
  function populateUsersTable(users) {
    GLOBAL_USER_DATA = users || [];
    applyUserFilters();
  }

  /** Applies search and status filters */
  function applyUserFilters() {
    var searchEl = document.getElementById('user-filter-search');
    var search = searchEl ? searchEl.value.toLowerCase() : "";
    var checkedStatus = Array.from(document.querySelectorAll('.user-filter-status-cb:checked')).map(cb => cb.value);
    var filtered = GLOBAL_USER_DATA.filter(function(u) {
      var fullname = ((u.firstName || "") + " " + (u.lastName || "")).toLowerCase();
      var matchSearch = u.username.toLowerCase().includes(search) || fullname.includes(search) || u.workEmail.toLowerCase().includes(search);
      var matchStatus = checkedStatus.length === 0 || checkedStatus.includes(u.status);
      return matchSearch && matchStatus;
    });
    renderUserTableRows(filtered);
  }

  /** Renders rows into the table body */
  function renderUserTableRows(users) {
    var tbody = document.getElementById('userTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">No users found.</td></tr>';
      return;
    }
    users.forEach(function(u) {
      var badgeClass = (u.status.toLowerCase() === 'active') ? 'badge-active' : 'badge-inactive';
      var tr = document.createElement('tr');
      tr.style.cursor = "pointer";
      tr.onclick = function(e) { if (!e.target.closest('.btn-edit')) openReadOnlyUser(u.rowIndex); };
      tr.innerHTML = `
        <td><strong>${u.username}</strong></td>
        <td>${u.firstName} ${u.lastName}</td>
        <td>${u.workEmail}</td>
        <td>${u.role}</td>
        <td>${u.position}</td>
        <td><span class="badge ${badgeClass}">${u.status}</span></td>
        <td><button class="btn-edit" onclick="openEditUserForm(${u.rowIndex}); event.stopPropagation();">Edit</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  /* --- FORM SUBMISSIONS --- */

  /** Opens add user form with clean state */
  function openAddUserForm() {
    resetAccordions('addUserView');
    switchView('addUserView');
    document.getElementById('addUserForm').reset();
    document.getElementById('add-photo-preview').src = DEFAULT_AVATAR;
    
    var msgEl = document.getElementById('add-user-msg');
    if (msgEl) msgEl.innerHTML = '';
    
    var submitBtn = document.getElementById('add-user-submit');
    if (submitBtn) submitBtn.disabled = false;
  }

  /** Submits 16 fields to backend */
  function handleAddUserSubmit(e) {
    if(e) e.preventDefault();
    var btn = document.getElementById('add-user-submit');
    btn.disabled = true;
    
    var msgEl = document.getElementById('add-user-msg');
    if (msgEl) {
        msgEl.innerHTML = 'Creating user...';
        msgEl.style.color = "var(--brand-grey)";
    }
    
    var obj = {
      username: document.getElementById('add-user-username').value,
      role: document.getElementById('add-user-role').value,
      workEmail: document.getElementById('add-user-email').value,
      firstName: document.getElementById('add-user-fname').value,
      lastName: document.getElementById('add-user-lname').value,
      birthday: document.getElementById('add-user-bday').value,
      personalEmail: document.getElementById('add-user-pemail').value,
      phone: document.getElementById('add-user-phone').value,
      address: document.getElementById('add-user-addr').value,
      facebookUrl: document.getElementById('add-user-fb').value,
      position: document.getElementById('add-user-pos').value,
      employmentType: document.getElementById('add-user-emptype').value,
      dateHired: document.getElementById('add-user-hired').value,
      status: document.getElementById('add-user-status').value,
      profilePhotoUrl: document.getElementById('add-photo-preview').src
    };
    
    google.script.run.withSuccessHandler(function(res) {
      if (msgEl) {
          msgEl.innerHTML = res;
      }
      
      if (res.includes("Success")) {
        if (msgEl) msgEl.style.color = "green";
        setTimeout(() => {
          // Fetch updated users and route to the new user's view-only profile
          google.script.run.withSuccessHandler(function(users) {
            populateUsersTable(users);
            var newUser = users.find(u => u.username === obj.username);
            if (newUser) {
              openReadOnlyUser(newUser.rowIndex);
            } else {
              switchView('usersListView');
            }
            document.getElementById('addUserForm').reset();
          }).getUsersList();
        }, 1500);
      } else {
        if (msgEl) msgEl.style.color = "var(--brand-red)";
        btn.disabled = false;
      }
    }).processNewUser(obj);
  }

  /** Populates edit form with backend data */
  function openEditUserForm(rowIndex) {
    resetAccordions('editUserView');
    switchView('editUserView');
    
    var msgEl = document.getElementById('edt-user-msg');
    if (msgEl) {
        msgEl.innerHTML = 'Loading user data...';
        msgEl.style.color = 'var(--brand-grey)';
    }
    
    var submitBtn = document.getElementById('edt-user-submit');
    if (submitBtn) submitBtn.disabled = false;
    
    google.script.run.withSuccessHandler(function(u) {
      if (msgEl) msgEl.innerHTML = '';
      document.getElementById('edt-user-rowIndex').value = u.rowIndex;
      document.getElementById('edt-user-username').value = u.username;
      document.getElementById('edt-user-role').value = u.role;
      document.getElementById('edt-user-email').value = u.workEmail;
      document.getElementById('edt-user-fname').value = u.firstName;
      document.getElementById('edt-user-lname').value = u.lastName;
      document.getElementById('edt-user-bday').value = safelyFormatDate(u.birthday);
      document.getElementById('edt-user-pemail').value = u.personalEmail;
      document.getElementById('edt-user-phone').value = u.phone;
      document.getElementById('edt-user-addr').value = u.address;
      document.getElementById('edt-user-fb').value = u.facebookUrl;
      document.getElementById('edt-user-pos').value = u.position;
      document.getElementById('edt-user-emptype').value = u.employmentType || "Full-Time";
      document.getElementById('edt-user-hired').value = safelyFormatDate(u.dateHired);
      document.getElementById('edt-user-status').value = u.status;
      document.getElementById('edt-photo-preview').src = getDirectImgUrl(u.profilePhotoUrl);
    }).getUserById(rowIndex);
  }

  /** Submits profile updates */
  function handleEditUserSubmit(e) {
    if(e) e.preventDefault();
    var btn = document.getElementById('edt-user-submit');
    btn.disabled = true;
    
    var msgEl = document.getElementById('edt-user-msg');
    if (msgEl) {
        msgEl.innerHTML = 'Saving changes...';
        msgEl.style.color = 'var(--brand-grey)';
    }
    
    var obj = {
      rowIndex: document.getElementById('edt-user-rowIndex').value,
      username: document.getElementById('edt-user-username').value,
      role: document.getElementById('edt-user-role').value,
      workEmail: document.getElementById('edt-user-email').value,
      firstName: document.getElementById('edt-user-fname').value,
      lastName: document.getElementById('edt-user-lname').value,
      birthday: document.getElementById('edt-user-bday').value,
      personalEmail: document.getElementById('edt-user-pemail').value,
      phone: document.getElementById('edt-user-phone').value,
      address: document.getElementById('edt-user-addr').value,
      facebookUrl: document.getElementById('edt-user-fb').value,
      position: document.getElementById('edt-user-pos').value,
      employmentType: document.getElementById('edt-user-emptype').value,
      dateHired: document.getElementById('edt-user-hired').value,
      status: document.getElementById('edt-user-status').value,
      profilePhotoUrl: document.getElementById('edt-photo-preview').src
    };
    
    google.script.run.withSuccessHandler(function(res) {
      if (msgEl) {
          msgEl.innerHTML = res;
      }
      
      if (res.includes("Success")) {
        if (msgEl) msgEl.style.color = "green";
        setTimeout(() => {
          // Sync changes quietly in the background and route to updated read-only profile
          google.script.run.withSuccessHandler(populateUsersTable).getUsersList();
          openReadOnlyUser(obj.rowIndex);
        }, 1500);
      } else {
        if (msgEl) msgEl.style.color = "var(--brand-red)";
        btn.disabled = false;
      }
    }).updateUserRecord(obj);
  }

  /** Populates read-only view */
  function openReadOnlyUser(rowIndex) {
    switchView('readOnlyUserView');
    google.script.run.withSuccessHandler(function(u) {
      document.getElementById('ro-user-photo').src = getDirectImgUrl(u.profilePhotoUrl);
      document.getElementById('ro-user-fullname').innerText = (u.firstName || "") + " " + (u.lastName || "");
      document.getElementById('ro-user-role-pos').innerText = u.role + " | " + u.position;
      document.getElementById('ro-user-username').innerText = u.username;
      document.getElementById('ro-user-email').innerText = u.workEmail;
      document.getElementById('ro-user-pemail').innerText = u.personalEmail || "N/A";
      document.getElementById('ro-user-phone').innerText = u.phone || "N/A";
      document.getElementById('ro-user-hired').innerText = u.dateHired || "N/A";
      document.getElementById('ro-user-emptype').innerText = u.employmentType || "N/A";
      document.getElementById('ro-user-bday').innerText = u.birthday || "N/A";
      document.getElementById('ro-user-fb').innerText = u.facebookUrl || "N/A";
      document.getElementById('ro-user-addr').innerText = u.address || "N/A";
      var badgeClass = (u.status.toLowerCase() === 'active') ? 'badge-active' : 'badge-inactive';
      document.getElementById('ro-user-status-badge').innerHTML = `<span class="badge ${badgeClass}">${u.status}</span>`;
      document.getElementById('ro-edit-link').onclick = () => openEditUserForm(u.rowIndex);
    }).getUserById(rowIndex);
  }
</script>
