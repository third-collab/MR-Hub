<script>
  /* ========================================================================
     1. UI, NAVIGATION & ACCORDIONS
     ======================================================================== */
  function toggleAccordion(element) {
    element.classList.toggle("active");
    var panel = element.nextElementSibling;
    if (panel.style.display === "block") {
      panel.style.display = "none";
    } else {
      panel.style.display = "block";
      initClientEditors();
    }
  }

  function resetAccordions(viewId) {
    var view = document.getElementById(viewId);
    if (!view) return;
    var accordions = view.querySelectorAll('.accordion');
    var panels = view.querySelectorAll('.panel');
    for (var i = 0; i < accordions.length; i++) {
      if (i === 0) {
        accordions[i].classList.add('active');
        panels[i].style.display = 'block';
      } else {
        accordions[i].classList.remove('active');
        panels[i].style.display = 'none';
      }
    }
  }

  function navigateClientTab(prefix, tabId) {
    var containerId = (prefix === 'ro') ? 'readOnlyClientView' : (prefix === 'add') ? 'addClientView' : 'editClientView';
    var view = document.getElementById(containerId);
    if (!view) return;
    
    var contents = view.querySelectorAll('.tab-content');
    var buttons = view.querySelectorAll('.tab-btn');
    
    if (contents.length > 0) {
      contents.forEach(c => c.style.display = 'none');
      buttons.forEach(b => b.classList.remove('active'));
      
      var targetContent = document.getElementById(prefix + '-' + tabId);
      var targetBtn = document.getElementById('btn-' + prefix + '-' + tabId);
      
      if (targetContent) targetContent.style.display = 'block';

  function safelyFormatDate(dateStr) {
    if (!dateStr) return "";
    try {
      var d = new Date(dateStr);
      if (isNaN(d.getTime())) return "";
      return d.toISOString().split('T')[0];
    } catch(e) { return ""; }
  }

  /* ========================================================================
     5. TABLE RENDERING, FILTERING & SORTING
     ======================================================================== */
  var GLOBAL_CLIENT_DATA = [];
  var CURRENT_CLIENT_SORT_COLUMN = 'companyName'; 
  var CURRENT_CLIENT_SORT_DESC = false; 

  function populateClientsTable(clients) {
    GLOBAL_CLIENT_DATA = clients || [];
    var amDrop = document.getElementById('client-am-drop');
    if (amDrop && amDrop.innerHTML.trim() === '') {
      var ams = ["Unassigned"];
      if (typeof ACCOUNT_MANAGERS !== 'undefined') {
         ACCOUNT_MANAGERS.forEach(function(am) { if (!ams.includes(am)) ams.push(am); });
      }
      amDrop.innerHTML = '';
      ams.forEach(function(am) {
        var label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" class="client-filter-am-cb" value="${am}" checked onchange="applyClientFilters()"> ${am}`;
        amDrop.appendChild(label);
      });
    }
    applyClientFilters();
  }

  function handleClientSort(column) {
    if (CURRENT_CLIENT_SORT_COLUMN === column) {
      CURRENT_CLIENT_SORT_DESC = !CURRENT_CLIENT_SORT_DESC;
    } else {
      CURRENT_CLIENT_SORT_COLUMN = column;
      CURRENT_CLIENT_SORT_DESC = false; 
    }
    applyClientFilters();
  }

  function applyClientFilters() {
    var searchInput = document.getElementById('client-filter-search');
    var searchText = searchInput ? searchInput.value.toLowerCase() : "";
    var checkedStatuses = Array.from(document.querySelectorAll('.client-filter-status-cb:checked')).map(cb => cb.value);
    var checkedServices = Array.from(document.querySelectorAll('.client-filter-service-cb:checked')).map(cb => cb.value);
    var checkedAMs = Array.from(document.querySelectorAll('.client-filter-am-cb:checked')).map(cb => cb.value);

    var filteredData = GLOBAL_CLIENT_DATA.filter(function(client) {
      var pContact = ((client.pFirstName || "") + " " + (client.pLastName || "")).toLowerCase();
      var matchesSearch = (client.companyName || "").toLowerCase().includes(searchText) || 
                           (client.brandName || "").toLowerCase().includes(searchText) || 
                           pContact.includes(searchText);
      
      var matchesStatus = checkedStatuses.length === 0 || checkedStatuses.includes(client.status);
      var cServicesArray = (client.services || "").split(',').map(s => s.trim());
      var matchesService = checkedServices.length === 0 || checkedServices.some(val => cServicesArray.includes(val));
      var matchesAM = checkedAMs.length === 0 || checkedAMs.includes(client.acctMgr || "Unassigned");

      return matchesSearch && matchesStatus && matchesService && matchesAM;
    });

    filteredData.sort(function(a, b) {
      var valA = a[CURRENT_CLIENT_SORT_COLUMN] || '';
      var valB = b[CURRENT_CLIENT_SORT_COLUMN] || '';
      if (CURRENT_CLIENT_SORT_COLUMN === 'primaryContact') {
        valA = (a.pFirstName || "") + " " + (a.pLastName || "");
        valB = (b.pFirstName || "") + " " + (b.pLastName || "");
      }
      if (typeof valA === 'string') valA = valA.toLowerCase();
      if (typeof valB === 'string') valB = valB.toLowerCase();
      if (valA < valB) return CURRENT_CLIENT_SORT_DESC ? 1 : -1;
      if (valA > valB) return CURRENT_CLIENT_SORT_DESC ? -1 : 1;
      return 0;
    });

    document.querySelectorAll('.sort-icon').forEach(function(icon) { if(icon.id.startsWith('csort-')) icon.innerHTML = ''; });
    var iconEl = document.getElementById('csort-' + CURRENT_CLIENT_SORT_COLUMN);
    if (iconEl) iconEl.innerHTML = CURRENT_CLIENT_SORT_DESC ? '▼' : '▲'; 
    renderClientTableRows(filteredData);
  }

  function renderClientTableRows(clients) {
    var tbody = document.getElementById('clientTableBody');
    if (!tbody) return;
    tbody.innerHTML = ''; 
    if (clients.length === 0) { 
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px;">No clients found.</td></tr>';
      return; 
    }
    clients.forEach(function(client) {
      var tr = document.createElement('tr');
      tr.style.cursor = "pointer"; 
      tr.onclick = function(e) { if (!e.target.closest('.btn-edit')) openReadOnlyClient(client.rowIndex); };
      
      var badgeClass = "badge badge-" + (client.status || "").toLowerCase();
      tr.innerHTML = `
        <td><strong>${client.brandName || "-"}</strong></td>
        <td>${((client.pFirstName || "") + " " + (client.pLastName || "")).trim() || "-"}</td>
        <td>${client.services || "-"}</td>
        <td>${client.acctMgr || "Unassigned"}</td>
        <td><span class="${badgeClass}">${client.status || "-"}</span></td>
        <td><button class="btn-edit" onclick="openEditClientForm(${client.rowIndex}); event.stopPropagation();">Edit</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

      if (!data) return;

      document.getElementById('ro-title').innerHTML = `${data.companyName} <span style="font-size: 14px; font-weight:normal; color:#888;">(${data.brandName})</span>`;
      document.getElementById('ro-edit-btn').onclick = function() { openEditClientForm(data.rowIndex); };

      var overviewHtml = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
           <div>
              <h4 style="color:var(--brand-red); border-bottom:1px solid #eee; padding-bottom:5px;">Brand Info</h4>
              <p><strong>Status:</strong> ${data.status}</p>
              <p><strong>Website:</strong> <a href="${data.website}" target="_blank">${data.website || 'N/A'}</a></p>
              <p><strong>Company Address:</strong><br>${data.address || 'N/A'}</p>
              <p><strong>Anniversary Date:</strong> ${safelyFormatDate(data.anniversary) || 'N/A'}</p>
              
              <h4 style="color:var(--brand-red); border-bottom:1px solid #eee; padding-bottom:5px; margin-top:20px;">Admin & Logistics</h4>
              <p><strong>Account Manager:</strong> ${data.acctMgr || 'Unassigned'}</p>
              <p><strong>Brand Code:</strong> ${data.brandCode || 'N/A'}</p>
              <p><strong>Brand Folder:</strong> <a href="${data.brandFolder}" target="_blank">${data.brandFolder ? 'Open Folder' : 'N/A'}</a></p>
              <p><strong>Brand Registered:</strong> ${data.brandReg || 'N/A'}</p>
           </div>
           <div>
              <h4 style="color:var(--brand-red); border-bottom:1px solid #eee; padding-bottom:5px;">Terms & Dates</h4>
              <p><strong>Monthly Value:</strong> $${data.monthlyVal || '0'}</p>
              <p><strong>Orig. Contract Start:</strong> ${safelyFormatDate(data.origStartDate) || 'N/A'}</p>
              <p><strong>Current Start Date:</strong> ${safelyFormatDate(data.currentStartDate) || safelyFormatDate(data.origStartDate) || 'N/A'}</p>
              <p><strong>Orig. Expiration:</strong> ${safelyFormatDate(data.origExpDate) || 'N/A'}</p>
              <p><strong>Current Expiration:</strong> ${safelyFormatDate(data.currentExpDate) || safelyFormatDate(data.origExpDate) || 'N/A'}</p>
              <p><strong>Original Cancel Date:</strong> ${safelyFormatDate(data.origEndDate) || 'N/A'}</p>
              <p><strong>Latest Cancel Date:</strong> ${safelyFormatDate(data.latestEndDate) || 'N/A'}</p>
              <p><strong>Contract Term:</strong> ${data.termCount || ''} ${data.termUnit || ''}</p>
              <p><strong>Commission:</strong> ${data.commRate || '0'}% (${data.commBasis || 'Basis N/A'})</p>
              
              <h4 style="color:var(--brand-red); border-bottom:1px solid #eee; padding-bottom:5px; margin-top:20px;">Launch Dates</h4>
              <p><strong>PPC Launch:</strong> ${safelyFormatDate(data.ppcDate) || 'N/A'}</p>
              <p><strong>DSP Launch:</strong> ${safelyFormatDate(data.dspDate) || 'N/A'}</p>
           </div>
        </div>
        
        <div style="margin-top:20px;">
           <h4 style="color:var(--brand-red); border-bottom:1px solid #eee; padding-bottom:5px;">Internal Remarks</h4>
           <p style="white-space: pre-wrap; font-style: italic; color: #555;">${data.remarks || 'No remarks.'}</p>
        </div>
      `;
      document.getElementById('ro-overview').innerHTML = overviewHtml;
      
      var handoverNotesHtml = `
        <h3 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">Handover Notes</h3>
        <div style="margin-top:15px; background: #fffbe6; padding: 20px; border-radius: 8px; border: 1px solid #ffe58f;">
            <div style="font-size:14px;">${data.handoverNotes || 'No handover notes recorded.'}</div>
        </div>
      `;
      document.getElementById('ro-handoverNotes').innerHTML = handoverNotesHtml;

      renderOpNotesList(data.operationalNotes);
      
      var contactsHtml = `
        <h3 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">Contacts</h3>
        <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
          <h4 style="margin-top:0; color:var(--brand-grey);">Primary Contact</h4>
          <p><strong>Name:</strong> ${data.pFirstName} ${data.pLastName}</p>
          <p><strong>Position:</strong> ${data.pPosition || 'N/A'}</p>
          <p><strong>Email:</strong> <a href="mailto:${data.pEmail}">${data.pEmail}</a></p>
          <p><strong>Phone:</strong> ${data.pPhone || 'N/A'}</p>
          <p><strong>Birthday:</strong> ${safelyFormatDate(data.pBirthday) || 'N/A'}</p>
          <p><strong>Direct Address:</strong> ${data.pAddress || 'N/A'}</p>
        </div>
      `;

      if (data.addContacts && data.addContacts !== "[]") {
        try { 
          var adds = JSON.parse(data.addContacts); 
          if (adds.length > 0) { 
            contactsHtml += `<h4 style="color:var(--brand-grey);">Additional Contacts</h4>`; 
            adds.forEach(c => { 
              contactsHtml += `
                <div style="background: #fff; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; border-radius: 4px;">
                  <p style="margin:0 0 5px 0;"><strong>${c.firstName || ''} ${c.lastName || ''}</strong> - ${c.position || 'N/A'}</p>
                  <p style="margin:0; font-size:13px; color:#666;">Email: ${c.email || 'N/A'} | Phone: ${c.phone || 'N/A'}</p>
                  ${c.address ? `<p style="margin:5px 0 0 0; font-size:13px;">Addr: ${c.address}</p>` : ''}
                </div>`; 
            }); 
          } 
        } catch(e) {}
      }

      contactsHtml += `<h3 style="border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top:30px;">Physical Addresses</h3>`;
      
      var parseAddr = function(json, title) {
        var html = `<h4 style="color:var(--brand-grey);">${title}</h4>`;
        try {
          var arr = JSON.parse(json);
          if (!arr || arr.length === 0) return html + '<p style="color:#888; font-size:13px;">No addresses listed.</p>';
          arr.forEach(a => {
            html += `
              <div style="background: #fff; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; border-radius: 4px;">
                <p style="margin:0 0 5px 0;"><strong>${a.contactName || 'Main'}</strong> | ${a.phone || ''} | ${a.email || ''}</p>
                <p style="margin:0; font-size:13px;">${a.street || ''}, ${a.city || ''}, ${a.state || ''} ${a.countryCode || ''}</p>
                ${a.remarks ? `<p style="margin:5px 0 0 0; font-size:12px; color:#888;">Note: ${a.remarks}</p>` : ''}
              </div>`;
          });
        } catch(e) { return html + '<p>Error loading addresses.</p>'; }
        return html;
      };

      contactsHtml += parseAddr(data.shipAddress, 'Shipping Addresses');
      contactsHtml += '<hr style="border:0; border-top:1px solid #eee; margin:20px 0;">';
      contactsHtml += parseAddr(data.retAddress, 'Return Addresses');

      document.getElementById('ro-contacts').innerHTML = contactsHtml;
      
      renderHistoryTab(data.history);
    }).getClientById(rowIndex);
  }

  // --- DRAG AND DROP REORDER LOGIC ---
  var draggedOpNoteIndex = null;
  function dragOpNoteStart(e, index) {
    draggedOpNoteIndex = index;
    e.dataTransfer.effectAllowed = 'move';
  }
  function dragOpNoteOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  }
  function dropOpNote(e, targetIndex) {
    e.preventDefault();
    if (draggedOpNoteIndex === null || draggedOpNoteIndex === targetIndex) return;

    var notes = [];
    try { notes = JSON.parse(window.CURRENT_VIEW_CLIENT_DATA.operationalNotes || "[]"); } catch(err){}
    
    var item = notes.splice(draggedOpNoteIndex, 1)[0];
    notes.splice(targetIndex, 0, item);
    
    window.CURRENT_VIEW_CLIENT_DATA.operationalNotes = JSON.stringify(notes);
    window.CURRENT_VIEW_CLIENT_DATA.editor = typeof CURRENT_USERNAME !== 'undefined' ? CURRENT_USERNAME : "Unknown User";
    
    renderOpNotesList(window.CURRENT_VIEW_CLIENT_DATA.operationalNotes);
    
    // Instead of forcing a full page reload for a reorder, we silently update the DB.
    google.script.run.updateClientRecord(window.CURRENT_VIEW_CLIENT_DATA);
  }

  // --- INLINE EDIT NOTE LOGIC ---
  function editOpNote(index) {
    // Hide text, show input
    document.getElementById('note-view-' + index).style.display = 'none';
    document.getElementById('note-edit-' + index).style.display = 'flex';
    // Remove draggable to allow text selection without dragging
    document.getElementById('opnote-row-' + index).setAttribute('draggable', 'false');
    
    var input = document.getElementById('note-input-' + index);
    input.focus();
  }

  function cancelOpNoteEdit(index) {
    document.getElementById('note-view-' + index).style.display = 'flex';
    document.getElementById('note-edit-' + index).style.display = 'none';
    document.getElementById('opnote-row-' + index).setAttribute('draggable', 'true');
    
    // Reset value
    var notes = [];
    try { notes = JSON.parse(window.CURRENT_VIEW_CLIENT_DATA.operationalNotes || "[]"); } catch(e){}
    if (notes[index]) {
       document.getElementById('note-input-' + index).value = notes[index].content;
    }
  }

  function saveOpNoteEdit(index) {
    var input = document.getElementById('note-input-' + index);
    var newContent = input.value.trim();
    
    if (!newContent) {
      input.style.border = '1px solid var(--brand-red)';
      setTimeout(() => { input.style.border = '1px solid #ccc'; }, 2000);
      return; 
    }

    var notes = [];
    try { notes = JSON.parse(window.CURRENT_VIEW_CLIENT_DATA.operationalNotes || "[]"); } catch(e){}
    if (!notes[index]) return;

    if (notes[index].content === newContent) {
       cancelOpNoteEdit(index); // No change, just close
       return;
    }

    notes[index].content = newContent;
    notes[index].editor = typeof CURRENT_USERNAME !== 'undefined' ? CURRENT_USERNAME : "Unknown User";
    notes[index].timestamp = new Date().toISOString();

    window.CURRENT_VIEW_CLIENT_DATA.operationalNotes = JSON.stringify(notes);
    window.CURRENT_VIEW_CLIENT_DATA.editor = typeof CURRENT_USERNAME !== 'undefined' ? CURRENT_USERNAME : "Unknown User";

    var listContainer = document.getElementById('ro-opnotes-list');
    listContainer.style.opacity = '0.5';
    listContainer.style.pointerEvents = 'none';

    google.script.run.withSuccessHandler(function(res) {
       listContainer.style.opacity = '1';
       listContainer.style.pointerEvents = 'auto';
       openReadOnlyClient(window.CURRENT_VIEW_CLIENT_DATA.rowIndex); 
    }).updateClientRecord(window.CURRENT_VIEW_CLIENT_DATA);
  }

  // --- QUICK ADD NOTE LOGIC ---
  function showQuickNoteInput() {
    document.getElementById('ro-add-note-trigger').style.display = 'none';
    var area = document.getElementById('ro-quick-note-area');
    area.style.display = 'flex';
    var input = document.getElementById('ro-quick-note-input');
    input.value = '';
    input.style.border = '1px solid #ccc';
    input.focus();
  }

  function hideQuickNoteInput() {
    document.getElementById('ro-add-note-trigger').style.display = 'block';
    document.getElementById('ro-quick-note-area').style.display = 'none';
  }

  function addQuickOpNote() {
    var input = document.getElementById('ro-quick-note-input');
    var content = input.value.trim();
    
    if (!content) {
      input.style.border = '1px solid var(--brand-red)';
      setTimeout(() => { input.style.border = '1px solid #ccc'; }, 2000);
      return; 
    }
    
    if (!window.CURRENT_VIEW_CLIENT_DATA) return;

    var btn = document.getElementById('ro-quick-note-btn');
    btn.innerText = "Saving...";
    btn.disabled = true;
    input.disabled = true;

    var newNote = {
      content: content,
      editor: typeof CURRENT_USERNAME !== 'undefined' ? CURRENT_USERNAME : "Unknown User",
      timestamp: new Date().toISOString()
    };

    var notes = [];
    try { notes = JSON.parse(window.CURRENT_VIEW_CLIENT_DATA.operationalNotes || "[]"); } catch(e){}
    notes.push(newNote); 

    window.CURRENT_VIEW_CLIENT_DATA.operationalNotes = JSON.stringify(notes);
    window.CURRENT_VIEW_CLIENT_DATA.editor = typeof CURRENT_USERNAME !== 'undefined' ? CURRENT_USERNAME : "Unknown User";

    google.script.run.withSuccessHandler(function(res) {
       input.value = '';
       input.disabled = false;
       btn.innerText = "Save Note";
       btn.disabled = false;
       hideQuickNoteInput();
       openReadOnlyClient(window.CURRENT_VIEW_CLIENT_DATA.rowIndex); 
    }).updateClientRecord(window.CURRENT_VIEW_CLIENT_DATA);
  }

  function renderOpNotesList(notesJson) {
    var container = document.getElementById('ro-opnotes-list');
    if (!container) return;
    var notes = [];
    try { notes = JSON.parse(notesJson || "[]"); } catch(e) {}

    if (notes.length === 0) {
      container.innerHTML = '<p style="color:#888; font-size:13px; text-align:center; padding:20px; background:#fff; border:1px solid #eee; border-radius:4px;">No operational notes added yet.</p>';
      return;
    }

    var html = '';
    notes.forEach((note, index) => {
      var dateStr = note.timestamp ? new Date(note.timestamp).toLocaleDateString() : 'Unknown Date';
      var contentEscaped = note.content ? note.content.replace(/"/g, '&quot;') : '';
      
      html += `
        <div id="opnote-row-${index}" draggable="true" 
             ondragstart="dragOpNoteStart(event, ${index})" 
             ondragover="dragOpNoteOver(event)" 
             ondragenter="this.style.border='2px dashed #C40004'; this.style.backgroundColor='#fff5f5';"
             ondragleave="this.style.border='1px solid #eee'; this.style.backgroundColor='#fff';"
             ondrop="this.style.border='1px solid #eee'; this.style.backgroundColor='#fff'; dropOpNote(event, ${index});"
             style="background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 4px; position: relative; transition: 0.2s;">
           
           <div id="note-view-${index}" style="display:flex; align-items:center; gap: 10px;">
              <div style="color: #ccc; cursor: grab;" title="Drag to reorder">&#9776;</div>
              <div style="flex: 1; font-size: 14px; color: #333; cursor: pointer; padding: 4px; border-radius: 4px; transition: background 0.2s;" 
                   onmouseover="this.style.backgroundColor='#f0f0f0'" 
                   onmouseout="this.style.backgroundColor='transparent'"
                   onclick="editOpNote(${index})" title="Click to edit">
                ${note.content}
              </div>
              <div style="font-size: 10px; color: #aaa; text-align: right; white-space: nowrap; margin-left: 10px; flex-shrink: 0;">
                 Last edited by ${note.editor || 'Unknown'} on ${dateStr}
              </div>
           </div>

           <div id="note-edit-${index}" style="display:none; align-items:center; gap: 10px; width: 100%;">
              <div style="color: transparent; width: 14px;">&#9776;</div>
              <input type="text" id="note-input-${index}" class="form-control" value="${contentEscaped}" style="flex:1; margin: 0;">
              <button class="btn-primary" onclick="saveOpNoteEdit(${index})" style="padding: 6px 12px; font-size: 12px; flex-shrink: 0;">Save</button>
              <button class="btn-filter-toggle" onclick="cancelOpNoteEdit(${index})" style="padding: 6px 12px; font-size: 12px; background: transparent; border: 1px solid #ddd; flex-shrink: 0;">Cancel</button>
           </div>

        </div>
      `;
    });
    container.innerHTML = html;
  }

  function renderHistoryTab(historyJsonString) {
    var container = document.getElementById('ro-history-container');
    if (!container) return;
    container.innerHTML = (!historyJsonString || historyJsonString === "[]") ? '<p style="color: #888;">No history available.</p>' : '';
    try {
      var historyData = JSON.parse(historyJsonString);
      historyData.forEach(entry => {
        var editorName = entry.editor ? ` &bull; Edited by <strong>${entry.editor}</strong>` : '';
        var html = `
          <div style="border-left: 3px solid var(--brand-red); padding-left: 15px; margin-bottom: 25px;">
            <div style="font-size: 12px; color: #666; margin-bottom: 8px; font-weight: bold;">${new Date(entry.timestamp).toLocaleString()}${editorName}</div>
            <ul style="margin: 0; padding-left: 20px; font-size: 13px; color: #333;">`;
        entry.changes.forEach(change => { 
          // Beautifully parsed JSON updates instead of raw strings
          if (change.old === "" && change.new.startsWith("Added")) {
             html += `<li style="margin-bottom: 4px;"><strong>${change.field}:</strong> <em style="color:#111;">${change.new}</em></li>`;
          } else if (change.new === "Removed") {
             html += `<li style="margin-bottom: 4px;"><strong>${change.field}:</strong> <em style="color:#888;">Removed "${change.old}"</em></li>`;
          } else {
             html += `<li style="margin-bottom: 4px;"><strong>${change.field}:</strong> Changed from <em style="color:#888;">"${change.old || '(empty)'}"</em> to <em style="color:#111;">"${change.new}"</em></li>`; 
          }
        });
        html += `</ul></div>`; 
        container.innerHTML += html;
      });
    } catch (e) { container.innerHTML = '<p style="color:red;">Error loading history.</p>'; }
  }
</script>
