<div id="clientListView" class="container" style="display: none;">
  <button class="btn-dash-back" onclick="switchView('dashboardView')">&#8592; Back to Dashboard</button>
  
  <div class="view-header-bar" style="margin-bottom: 15px;">
    <h2>Clients Database</h2>
    <button class="btn-primary" onclick="openAddClientForm()">+ Add Client</button>
  </div>

  <div class="filter-wrapper">
    <input type="text" id="client-filter-search" class="filter-input" placeholder="Search by Brand, Contact, or Services..." onkeyup="applyClientFilters()">
    <button class="btn-filter-toggle" onclick="toggleFilter('client-adv')">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      Filters
    </button>
  
    <div id="client-adv" class="filter-advanced">
      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('client-status-drop')">Status ▼</button>
        <div class="dropdown-content" id="client-status-drop">
          <label><input type="checkbox" class="client-filter-status-cb" value="Onboarding" checked onchange="applyClientFilters()"> Onboarding</label>
          <label><input type="checkbox" class="client-filter-status-cb" value="Active" checked onchange="applyClientFilters()"> Active</label>
          <label><input type="checkbox" class="client-filter-status-cb" value="Paused" onchange="applyClientFilters()"> Paused</label>
          <label><input type="checkbox" class="client-filter-status-cb" value="Inactive" onchange="applyClientFilters()"> Inactive</label>
        </div>
      </div>

      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('client-service-drop')">Services ▼</button>
        <div class="dropdown-content" id="client-service-drop">
          <label><input type="checkbox" class="client-filter-service-cb" value="Brand Management" checked onchange="applyClientFilters()"> Brand Management</label>
          <label><input type="checkbox" class="client-filter-service-cb" value="Listing Optimization" checked onchange="applyClientFilters()"> Listing Optimization</label>
          <label><input type="checkbox" class="client-filter-service-cb" value="Managed Listing Optimization" checked onchange="applyClientFilters()"> Managed Listing Optimization</label>
        </div>
      </div>

      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('client-am-drop')">Account Manager ▼</button>
        <div class="dropdown-content" id="client-am-drop"></div>
      </div>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="sortable" onclick="handleClientSort('brandName')">Brand Name <span id="csort-brandName" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleClientSort('primaryContact')">Primary Contact <span id="csort-primaryContact" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleClientSort('services')">Services <span id="csort-services" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleClientSort('acctMgr')">Account Manager <span id="csort-acctMgr" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleClientSort('status')">Status <span id="csort-status" class="sort-icon"></span></th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="clientTableBody"></tbody>
    </table>
  </div>
</div>

<script>
  /**
   * Processes UI inputs and filters the client list.
   * Blueprint Checkpoint: Uses Exact Match Logic for multi-select services.
   */
  function applyClientFilters() {
    var searchInput = document.getElementById('client-filter-search');
    var searchText = searchInput ? searchInput.value.toLowerCase() : "";
    var checkedStatuses = Array.from(document.querySelectorAll('.client-filter-status-cb:checked')).map(cb => cb.value);
    var checkedServices = Array.from(document.querySelectorAll('.client-filter-service-cb:checked')).map(cb => cb.value);
    var checkedAMs = Array.from(document.querySelectorAll('.client-filter-am-cb:checked')).map(cb => cb.value);

    var filteredData = GLOBAL_CLIENT_DATA.filter(function(client) {
      var pContact = ((client.pFirstName || "") + " " + (client.pLastName || "")).toLowerCase();
      var matchesSearch = (client.companyName || "").toLowerCase().includes(searchText) || 
                           (client.brandName || "").toLowerCase().includes(searchText) || 
                           pContact.includes(searchText);
      
      var matchesStatus = checkedStatuses.length === 0 || checkedStatuses.includes(client.status);
      
      // Blueprint: Exact Match Logic for multi-select strings
      var cServicesArray = (client.services || "").split(',').map(s => s.trim());
      var matchesService = checkedServices.length === 0 || checkedServices.some(checkedValue => cServicesArray.includes(checkedValue));
      
      var matchesAM = checkedAMs.length === 0 || checkedAMs.includes(client.acctMgr || "Unassigned");

      return matchesSearch && matchesStatus && matchesService && matchesAM;
    });

    renderClientTableRows(filteredData);
  }

  /**
   * Renders the HTML table rows for the client list.
   * Blueprint Checkpoint: Uses mid-tone badge classes.
   * @param {Array} clients - The filtered list of clients.
   */
  function renderClientTableRows(clients) {
    var tbody = document.getElementById('clientTableBody');
    if (!tbody) return;
    tbody.innerHTML = ''; 
    
    clients.forEach(function(client) {
      var tr = document.createElement('tr');
      tr.style.cursor = "pointer"; 
      tr.onclick = e => { if (!e.target.closest('.btn-edit')) openReadOnlyClient(client.rowIndex); };

      var badgeClass = "badge"; 
      var statusText = (client.status || "").toLowerCase();
      if (statusText === 'active') badgeClass = 'badge badge-active';
      else if (statusText === 'inactive') badgeClass = 'badge badge-inactive';
      else if (statusText === 'onboarding') badgeClass = 'badge badge-onboarding';
      else if (statusText === 'paused') badgeClass = 'badge badge-paused';
      
      tr.innerHTML = `
        <td><strong>${client.brandName || "-"}</strong></td>
        <td>${(client.pFirstName + " " + client.pLastName).trim() || "-"}</td>
        <td>${client.services || "-"}</td>
        <td>${client.acctMgr || "Unassigned"}</td>
        <td><span class="${badgeClass}">${client.status || "-"}</span></td>
        <td><button class="btn-edit" onclick="openEditClientForm(${client.rowIndex})">Edit</button></td>
      `;
      tbody.appendChild(tr);
    });
  }
</script>
