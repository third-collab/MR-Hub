<div id="clientListView" class="container" style="display: none;">
  <button class="btn-dash-back" onclick="switchView('dashboardView')">&#8592; Back to Dashboard</button>
  
  <div class="view-header-bar" style="margin-bottom: 15px;">
    <h2>Clients Database</h2>
    <button class="btn-primary" onclick="openAddClientForm()">+ Add Client</button>
  </div>

  <div class="filter-wrapper">
    <input type="text" id="client-filter-search" class="filter-input" placeholder="Search by Brand, Contact, or Services..." onkeyup="applyClientFilters()">
    <button class="btn-filter-toggle" onclick="toggleFilter('client-adv')">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      Filters
    </button>
    
    <div id="client-adv" class="filter-advanced">
      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('client-status-drop')">Status ▼</button>
        <div class="dropdown-content" id="client-status-drop">
          <label><input type="checkbox" class="client-filter-status-cb" value="Onboarding" checked onchange="applyClientFilters()"> Onboarding</label>
          <label><input type="checkbox" class="client-filter-status-cb" value="Active" checked onchange="applyClientFilters()"> Active</label>
          <label><input type="checkbox" class="client-filter-status-cb" value="Paused" onchange="applyClientFilters()"> Paused</label>
          <label><input type="checkbox" class="client-filter-status-cb" value="Inactive" onchange="applyClientFilters()"> Inactive</label>
        </div>
      </div>

      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('client-service-drop')">Services ▼</button>
        <div class="dropdown-content" id="client-service-drop">
          <label><input type="checkbox" class="client-filter-service-cb" value="Brand Management" checked onchange="applyClientFilters()"> Brand Management</label>
          <label><input type="checkbox" class="client-filter-service-cb" value="Listing Optimization" checked onchange="applyClientFilters()"> Listing Optimization</label>
          <label><input type="checkbox" class="client-filter-service-cb" value="Branded Listing Optimization" checked onchange="applyClientFilters()"> Branded Listing Optimization</label>
        </div>
      </div>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="sortable" onclick="handleClientSort('brandName')">Brand Name <span id="csort-brandName" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleClientSort('primaryContact')">Primary Contact <span id="csort-primaryContact" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleClientSort('services')">Services <span id="csort-services" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleClientSort('status')">Status <span id="csort-status" class="sort-icon"></span></th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="clientTableBody">
        <tr>
          <td colspan="5" style="text-align:center; padding: 30px;">Loading clients...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  /* ========================================================================
     1. UI, NAVIGATION & ACCORDIONS
     ======================================================================== */
  function toggleAccordion(element) {
    element.classList.toggle("active");
    var panel = element.nextElementSibling;
    
    if (panel.style.display === "block") {
      panel.style.display = "none";
    } else {
      panel.style.display = "block";
      // Force Quill to initialize safely the moment an accordion opens
      initClientEditors();
    }
  }
  
  /* ========================================================================
     2. RICH TEXT EDITOR & DATE FORMATTER
     ======================================================================== */
  var addClientQuill, editClientQuill;
  
  function initClientEditors() {
    if (typeof Quill !== 'undefined') {
      try {
        var addEd = document.getElementById('add-editor');
        if (!addClientQuill && addEd && addEd.offsetHeight > 0) {
          addClientQuill = new Quill('#add-editor', { theme: 'snow' });
        }
        var edtEd = document.getElementById('edt-editor');
        if (!editClientQuill && edtEd && edtEd.offsetHeight > 0) {
          editClientQuill = new Quill('#edt-editor', { theme: 'snow' });
        }
      } catch(e) { console.error("Quill error:", e); }
    }
  }

  function safelyFormatDate(dateStr) {
    if (!dateStr) return "";
    try {
      var d = new Date(dateStr);
      if (isNaN(d.getTime())) return "";
      return d.toISOString().split('T')[0];
    } catch(e) { 
      return ""; 
    }
  }

  /* ========================================================================
     3. DYNAMIC JSON ROWS (Contacts & Addresses)
     ======================================================================== */
  function addContactRow(containerId, data = {}) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var row = document.createElement('div');
    row.className = 'dynamic-json-row';
    row.style = 'border: 1px solid #ddd; background: #fafafa; padding: 15px; margin-bottom: 10px; border-radius: 4px;';
    row.innerHTML = `
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" class="c-fname form-control" placeholder="First Name" value="${data.firstName || ''}">
        <input type="text" class="c-lname form-control" placeholder="Last Name" value="${data.lastName || ''}">
        <input type="email" class="c-email form-control" placeholder="Email" value="${data.email || ''}">
        <input type="text" class="c-phone form-control" placeholder="Phone" value="${data.phone || ''}">
        <input type="text" class="c-pos form-control" placeholder="Position" value="${data.position || ''}">
        <input type="date" class="c-bday form-control" placeholder="Birthday" value="${data.birthday || ''}">
      </div>
      <div style="margin-top: 10px;">
        <input type="text" class="c-address form-control" placeholder="Full Address" value="${data.address || ''}" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="text-align: right; margin-top: 10px;">
        <button type="button" style="color: #d9534f; border: none; background: none; font-size: 12px; cursor: pointer; text-decoration: underline;" onclick="this.parentElement.parentElement.remove()">Remove Contact</button>
      </div>
    `;
    container.appendChild(row);
  }

  function addAddressRow(containerId, data = {}) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var row = document.createElement('div');
    row.className = 'dynamic-json-row';
    row.style = 'border: 1px solid #ddd; background: #fafafa; padding: 15px; margin-bottom: 10px; border-radius: 4px;';
    row.innerHTML = `
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px;">
        <input type="text" class="a-contact form-control" placeholder="Contact Name" value="${data.contactName || ''}">
        <input type="text" class="a-phone form-control" placeholder="Phone Number" value="${data.phone || ''}">
        <input type="email" class="a-email form-control" placeholder="Email" value="${data.email || ''}">
      </div>
      <div style="margin-bottom: 10px;">
        <input type="text" class="a-street form-control" placeholder="Street Address" value="${data.street || ''}" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px;">
        <input type="text" class="a-city form-control" placeholder="City" value="${data.city || ''}">
        <input type="text" class="a-state form-control" placeholder="State/Prov" value="${data.state || ''}">
        <input type="text" class="a-country form-control" placeholder="Country Code" value="${data.countryCode || ''}">
      </div>
      <div style="margin-bottom: 10px;">
        <input type="text" class="a-remarks form-control" placeholder="Remarks" value="${data.remarks || ''}" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="text-align: right; margin-top: 10px;">
        <button type="button" style="color: #d9534f; border: none; background: none; font-size: 12px; cursor: pointer; text-decoration: underline;" onclick="this.parentElement.parentElement.remove()">Remove Address</button>
      </div>
    `;
    container.appendChild(row);
  }

  function getContactsJSON(containerId) {
    var container = document.getElementById(containerId);
    if (!container) return "[]";
    var rows = container.querySelectorAll('.dynamic-json-row');
    var contacts = [];
    rows.forEach(function(row) {
      contacts.push({
        firstName: row.querySelector('.c-fname').value,
        lastName: row.querySelector('.c-lname').value,
        email: row.querySelector('.c-email').value,
        phone: row.querySelector('.c-phone').value,
        position: row.querySelector('.c-pos').value,
        birthday: row.querySelector('.c-bday').value,
        address: row.querySelector('.c-address').value
      });
    });
    return JSON.stringify(contacts);
  }

  function getAddressesJSON(containerId) {
    var container = document.getElementById(containerId);
    if (!container) return "[]";
    var rows = container.querySelectorAll('.dynamic-json-row');
    var addresses = [];
    rows.forEach(function(row) {
      addresses.push({
        contactName: row.querySelector('.a-contact').value,
        phone: row.querySelector('.a-phone').value,
        email: row.querySelector('.a-email').value,
        street: row.querySelector('.a-street').value,
        city: row.querySelector('.a-city').value,
        state: row.querySelector('.a-state').value,
        countryCode: row.querySelector('.a-country').value,
        remarks: row.querySelector('.a-remarks').value
      });
    });
    return JSON.stringify(addresses);
  }

  /* ========================================================================
     4. ACCOUNT MANAGER DATA FETCHER
     ======================================================================== */
  function populateAccountManagersDropdown(selectId, selectedValue) {
    var selectEl = document.getElementById(selectId);
    if (!selectEl) return;
    selectEl.innerHTML = '<option value="">Loading AMs...</option>';
    
    google.script.run
      .withSuccessHandler(function(users) {
        if (!users || !Array.isArray(users) || users.length === 0) {
          selectEl.innerHTML = '<option value="">Error: No users in database</option>';
          return;
        }
        
        selectEl.innerHTML = '<option value="">Select Account Manager</option>';
        
        // Filter STRICTLY for Active users with "Account Manager" in their Position
        var managers = users.filter(function(u) {
          var pos = (u.position || "").toLowerCase().trim();
          var status = (u.status || "").trim();
          
          return status === 'Active' && pos.includes('account manager');
        });
        
        managers.forEach(function(u) {
          // Display and set the value exclusively to the Username
          if (u.username) {
            var opt = document.createElement('option');
            opt.value = u.username;
            opt.text = u.username;
            selectEl.appendChild(opt);
          }
        });
        
        if (selectedValue) selectEl.value = selectedValue;
      })
      .withFailureHandler(function(err) {
        selectEl.innerHTML = '<option value="">Network Error: ' + err.message + '</option>';
      })
      .getUsersList();
  }

  /* ========================================================================
     5. TABLE RENDERING, FILTERING & SORTING
     ======================================================================== */
  var GLOBAL_CLIENT_DATA = [];
  var CURRENT_CLIENT_SORT_COLUMN = 'companyName'; 
  var CURRENT_CLIENT_SORT_DESC = false; 

  function populateTable(clients) {
    GLOBAL_CLIENT_DATA = clients || [];
    applyClientFilters();
  }

  function handleClientSort(column) {
    if (CURRENT_CLIENT_SORT_COLUMN === column) {
      CURRENT_CLIENT_SORT_DESC = !CURRENT_CLIENT_SORT_DESC; 
    } else {
      CURRENT_CLIENT_SORT_COLUMN = column;
      CURRENT_CLIENT_SORT_DESC = false; 
    }
    applyClientFilters();
  }

  function applyClientFilters() {
    var searchInput = document.getElementById('client-filter-search');
    var searchText = searchInput ? searchInput.value.toLowerCase() : "";
    
    var checkedStatuses = Array.from(document.querySelectorAll('.client-filter-status-cb:checked')).map(function(cb) { return cb.value; });
    var checkedServices = Array.from(document.querySelectorAll('.client-filter-service-cb:checked')).map(function(cb) { return cb.value; });

    var filteredData = GLOBAL_CLIENT_DATA.filter(function(client) {
      var pContact = ((client.pFirstName || "") + " " + (client.pLastName || "")).toLowerCase();
      var matchesSearch = ((client.companyName || "").toLowerCase().includes(searchText) || 
                           (client.brandName || "").toLowerCase().includes(searchText) || 
                           (client.services || "").toLowerCase().includes(searchText) || 
                           pContact.includes(searchText));
      
      var matchesStatus = checkedStatuses.length === 0 || checkedStatuses.includes(client.status);
      var cServices = client.services || "";
      var matchesService = checkedServices.length === 0 || checkedServices.some(function(s) { 
        return cServices.includes(s); 
      });

      return matchesSearch && matchesStatus && matchesService;
    });

    filteredData.sort(function(a, b) {
      var valA = a[CURRENT_CLIENT_SORT_COLUMN] || '';
      var valB = b[CURRENT_CLIENT_SORT_COLUMN] || '';
      
      if (CURRENT_CLIENT_SORT_COLUMN === 'primaryContact') {
        valA = (a.pFirstName || "") + " " + (a.pLastName || "");
        valB = (b.pFirstName || "") + " " + (b.pLastName || "");
      }
      
      if (typeof valA === 'string') valA = valA.toLowerCase();
      if (typeof valB === 'string') valB = valB.toLowerCase();

      if (valA < valB) return CURRENT_CLIENT_SORT_DESC ? 1 : -1;
      if (valA > valB) return CURRENT_CLIENT_SORT_DESC ? -1 : 1;
      return 0;
    });

    document.querySelectorAll('.sort-icon').forEach(function(icon) { if(icon.id.startsWith('csort-')) icon.innerHTML = ''; });
    var iconEl = document.getElementById('csort-' + CURRENT_CLIENT_SORT_COLUMN);
    if (iconEl) iconEl.innerHTML = CURRENT_CLIENT_SORT_DESC ? '▼' : '▲'; 

    renderClientTableRows(filteredData);
  }

  function renderClientTableRows(clients) {
    var tbody = document.getElementById('clientTableBody');
    if (!tbody) return;
    tbody.innerHTML = ''; 
    
    if (clients.length === 0) { 
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 30px;">No clients found.</td></tr>'; 
      return; 
    }
    
    clients.forEach(function(client) {
      var tr = document.createElement('tr');
      tr.style.cursor = "pointer"; 
      
      tr.onclick = function(e) { 
        if (!e.target.closest('.btn-edit')) {
          if (typeof viewClient === "function") viewClient(client.rowIndex);
        }
      };

      var pContact = (client.pFirstName || "") + " " + (client.pLastName || "");
      
      // Determine the correct global CSS class based on the status text
      var badgeClass = "badge"; // default fallback
      var statusText = (client.status || "").toLowerCase();
      
      if (statusText === 'active') badgeClass = 'badge badge-active';
      else if (statusText === 'inactive') badgeClass = 'badge badge-inactive';
      else if (statusText === 'onboarding') badgeClass = 'badge badge-onboarding';
      else if (statusText === 'paused' || statusText === 'pending') badgeClass = 'badge badge-paused';
      
      tr.innerHTML = `
        <td><strong>${client.brandName || "-"}</strong></td>
        <td>${pContact.trim() || "-"}</td>
        <td>${client.services || "-"}</td>
        <td><span class="${badgeClass}">${client.status || "-"}</span></td>
        <td><button class="btn-edit" onclick="openEditClientForm(${client.rowIndex})">Edit</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  /* ========================================================================
     6. ADD CLIENT FORM SUBMISSION
     ======================================================================== */
  function handleAddClientSubmit(e) {
    if(e) e.preventDefault();
    var company = document.getElementById('add-company').value;
    var brand = document.getElementById('add-brand').value;
    if (!company || !brand) {
      alert("Company Name and Brand Name are required.");
      return;
    }

    var statusEl = document.getElementById('add-status');
    if(statusEl) {
      statusEl.innerHTML = "Creating client record...";
      statusEl.style.color = "var(--brand-grey)";
    }
    var submitBtn = document.getElementById('add-submit');
    if(submitBtn) submitBtn.disabled = true;

    var services = [];
    document.querySelectorAll('input[name="add-services"]:checked').forEach(function(cb) {
      services.push(cb.value);
    });

    var clientData = {
      isEditMode: false,
      companyName: company,
      brandName: brand,
      address: document.getElementById('add-address').value,
      website: document.getElementById('add-website').value,
      pFirstName: document.getElementById('add-priFirst').value,
      pLastName: document.getElementById('add-priLast').value,
      pEmail: document.getElementById('add-priEmail').value,
      pPhone: document.getElementById('add-priPhone').value,
      pPosition: document.getElementById('add-priPosition').value,
      pBirthday: document.getElementById('add-priBirthday').value,
      pAddress: document.getElementById('add-priAddress').value,
      addContacts: getContactsJSON('add-contacts-container'),
      monthlyVal: document.getElementById('add-value').value,
      startDate: document.getElementById('add-date').value,
      services: services.join(', '),
      salesNotes: (addClientQuill) ? addClientQuill.root.innerHTML : "", 
      status: "Onboarding"
    };

    google.script.run
      .withSuccessHandler(function(res) {
        if(statusEl) {
          statusEl.innerHTML = res;
          statusEl.style.color = res.includes("Error") ? "var(--brand-red)" : "green";
        }
        if(submitBtn) submitBtn.disabled = false;
        if (!res.includes("Error")) {
          document.getElementById('addClientForm').reset();
          if(addClientQuill) addClientQuill.setContents([]);
          document.getElementById('add-contacts-container').innerHTML = '';
          setTimeout(function() { switchView('clientListView'); }, 1500);
        }
      })
      .withFailureHandler(function(err) {
        if(statusEl) {
          statusEl.innerHTML = "Database Error: " + err.message;
          statusEl.style.color = "var(--brand-red)";
        }
        if(submitBtn) submitBtn.disabled = false;
      })
      .saveClient(clientData);
  }

  /* ========================================================================
     7. EDIT CLIENT FORM LOADING & SUBMISSION
     ======================================================================== */
  function resetAccordions(viewId) {
    var view = document.getElementById(viewId);
    if (!view) return;
    var accordions = view.querySelectorAll('.accordion');
    var panels = view.querySelectorAll('.panel');
    
    // Loop through all accordions in this view
    for (var i = 0; i < accordions.length; i++) {
      if (i === 0) {
        // Force the first one open
        accordions[i].classList.add('active');
        panels[i].style.display = 'block';
      } else {
        // Force the rest closed
        accordions[i].classList.remove('active');
        panels[i].style.display = 'none';
      }
    }
  }

  function openAddClientForm() {
    switchView('addClientView');
    resetAccordions('addClientView'); // Reset the accordions
    document.getElementById('addClientForm').reset(); // Clear input fields
    document.getElementById('add-contacts-container').innerHTML = ''; // Clear dynamic contacts
    
    // Clear the rich text editor if it exists
    if (addClientQuill) addClientQuill.setContents([]); 
    
    initClientEditors(); // Ensure rich text loads safely
  }


  function openEditClientForm(rowIndex) {
    switchView('editClientView');

          document.getElementById('edt-company').value = data.companyName || "";
          document.getElementById('edt-brand').value = data.brandName || "";

          document.getElementById('edt-priPosition').value = data.pPosition || "";
          document.getElementById('edt-priBirthday').value = safelyFormatDate(data.pBirthday);

            try { JSON.parse(data.addContacts).forEach(function(c) { addContactRow('edt-contacts-container', c); }); } catch(e) {}

          document.getElementById('edt-value').value = data.monthlyVal || "";

          document.getElementById('edt-termCount').value = data.termCount || "";
          document.getElementById('edt-termUnit').value = data.termUnit || "Months";
          document.getElementById('edt-expDate').value = safelyFormatDate(data.expDate);
          document.getElementById('edt-brandReg').value = data.brandReg || "No";
          document.getElementById('edt-commRate').value = data.commRate || "";
          document.getElementById('edt-commBasis').value = data.commBasis || "";
          document.getElementById('edt-ppcDate').value = safelyFormatDate(data.ppcDate);
          document.getElementById('edt-dspDate').value = safelyFormatDate(data.dspDate);

          if (data.shipAddress) {
            try { JSON.parse(data.shipAddress).forEach(function(s) { addAddressRow('edt-shipping-container', s); }); } catch(e) {}
          }
          if (data.retAddress) {
            try { JSON.parse(data.retAddress).forEach(function(r) { addAddressRow('edt-return-container', r); }); } catch(e) {}
          }

          document.getElementById('edt-status').value = data.status || "Active";
          document.getElementById('edt-brandCode').value = data.brandCode || "";
          populateAccountManagersDropdown('edt-acctMgr', data.acctMgr);
          document.getElementById('edt-folder').value = data.brandFolder || "";
          
          var remarksEl = document.getElementById('edt-remarks');
          if (remarksEl) remarksEl.value = data.remarks || "";
          
          setTimeout(function() {
             if (editClientQuill) {
                editClientQuill.clipboard.dangerouslyPasteHTML(data.salesNotes || "");
             } else {
                var editorEl = document.getElementById('edt-editor');
                if (editorEl) editorEl.innerHTML = data.salesNotes || ""; 
             }
          }, 300);

        } catch (err) {
          if(statusMsg) { statusMsg.innerHTML = "UI Mapping Error: " + err.message; statusMsg.style.color = "var(--brand-red)"; }
        }
      })
      .withFailureHandler(function(err) {
        if(statusMsg) { statusMsg.innerHTML = "Server Connectivity Error: " + err.message; statusMsg.style.color = "var(--brand-red)"; }
      })
      .getClientById(rowIndex);
  }

  /* ========================================================================
     8. VIEW ONLY CLIENT & HISTORY RENDERING
     ======================================================================== */
  function viewClient(rowIndex) {
    switchView('readOnlyClientView');
    
    var roOverview = document.getElementById('ro-overview');
    var roContacts = document.getElementById('ro-contacts');
    var roHistory = document.getElementById('ro-history-container');
    
    if (roOverview) roOverview.innerHTML = "<p>Loading client data...</p>";
    if (roContacts) roContacts.innerHTML = "";
    if (roHistory) roHistory.innerHTML = "";

    google.script.run.withSuccessHandler(function(data) {
      if (!data) return;

      if (roOverview) {
        roOverview.innerHTML = `
          <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
             <h2 style="margin:0;">${data.companyName} <span style="font-size: 14px; font-weight:normal; color:#888;">(${data.brandName})</span></h2>
             <button class="btn-edit" onclick="openEditClientForm(${data.rowIndex})">Edit Client</button>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
             <div>
                <p><strong>Status:</strong> ${data.status}</p>
                <p><strong>Website:</strong> <a href="${data.website}" target="_blank">${data.website || 'N/A'}</a></p>
                <p><strong>Account Manager:</strong> ${data.acctMgr || 'N/A'}</p>
                <p><strong>Brand Code:</strong> ${data.brandCode || 'N/A'}</p>
             </div>
             <div>
                <p><strong>Monthly Value:</strong> $${data.monthlyVal || '0'}</p>
                <p><strong>Contract Start:</strong> ${safelyFormatDate(data.startDate) || 'N/A'}</p>
                <p><strong>Terms:</strong> ${data.termCount || ''} ${data.termUnit || ''}</p>
             </div>
          </div>
        `;
      }

      var contactsHtml = `
        <h3 style="border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top:30px;">Primary Contact</h3>
        <p><strong>Name:</strong> ${data.pFirstName} ${data.pLastName}</p>
        <p><strong>Position:</strong> ${data.pPosition || 'N/A'}</p>
        <p><strong>Email:</strong> <a href="mailto:${data.pEmail}">${data.pEmail}</a></p>
        <p><strong>Phone:</strong> ${data.pPhone || 'N/A'}</p>
        <p><strong>Address:</strong> ${data.pAddress || 'N/A'}</p>
      `;

      if (data.addContacts && data.addContacts !== "[]") {
        try {
          var adds = JSON.parse(data.addContacts);
          if (adds.length > 0) {
            contactsHtml += `<h3 style="border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top:20px;">Additional Contacts</h3>`;
            adds.forEach(function(c, i) {
              contactsHtml += `
                <div style="background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 4px;">
                  <p style="margin:0 0 5px 0;"><strong>${c.firstName || ''} ${c.lastName || ''}</strong> - ${c.position || 'N/A'}</p>
                  <p style="margin:0 0 5px 0; font-size:13px;">Email: ${c.email || 'N/A'} | Phone: ${c.phone || 'N/A'}</p>
                  ${c.address ? `<p style="margin:0; font-size:13px;">Address: ${c.address}</p>` : ''}
                </div>`;
            });
          }
        } catch(e) {}
      }
      
      if (roContacts) roContacts.innerHTML = contactsHtml;
      if (roHistory) renderHistoryTab(data.history);

    }).getClientById(rowIndex);
  }

  function renderHistoryTab(historyJsonString) {
    var container = document.getElementById('ro-history-container');
    if (!container) return;
    container.innerHTML = '';
    
    if (!historyJsonString || historyJsonString === "[]") {
      container.innerHTML = '<p style="color: #888;">No update history available yet.</p>';
      return;
    }

    try {
      var historyData = JSON.parse(historyJsonString);
      historyData.forEach(function(entry) {
        var dateStr = new Date(entry.timestamp).toLocaleString();
        var html = `
          <div style="border-left: 3px solid var(--brand-red); padding-left: 15px; margin-bottom: 25px;">
            <div style="font-size: 12px; color: #666; margin-bottom: 8px; font-weight: bold;">${dateStr}</div>
            <ul style="margin: 0; padding-left: 20px; font-size: 13px; color: #333;">`;
        
        entry.changes.forEach(function(change) {
          html += `<li style="margin-bottom: 4px;"><strong>${change.field}:</strong> Changed from <em style="color:#888;">"${change.old || '(empty)'}"</em> to <em style="color:#111;">"${change.new}"</em></li>`;
        });
        
        html += `</ul></div>`;
        container.innerHTML += html;
      });
    } catch (e) {
      container.innerHTML = '<p style="color:red;">Error loading history data.</p>';
    }
  }
