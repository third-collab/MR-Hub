<!-- 
  Notifications Module - Frontend
  Standardized under SparkHub Architecture Blueprint.
  
  CORE RESPONSIBILITIES:
  - System-wide event logging and display.
  - Interactive notification bell and popup management.
  - Standardized list view with multi-layered Category and Status filtering.
-->

<style>
  /* Local styling for the notifications history view */
  .full-notif-unread {
    background-color: rgba(196, 0, 4, 0.02);
  }
  .status-dot {
    transition: background-color 0.5s ease;
  }
  /* Specific styling for the notifications popup items */
  .notif-item {
    padding: 12px;
    border-bottom: 1px solid #f1f5f9;
    transition: background 0.2s;
    cursor: default;
  }
  .notif-unread {
    background-color: rgba(196, 0, 4, 0.03);
    border-left: 3px solid var(--brand-primary);
  }
  .notif-item:hover {
    background-color: #f8fafc;
  }
</style>

<!-- List View: Master Notifications Directory -->
<div id="notificationsListView" class="container" style="display: none;">
  <button class="btn-dash-back" onclick="switchView('dashboardView')">&#8592; Back to Dashboard</button>
  
  <div class="view-header-bar" style="margin-bottom: 15px;">
    <h2>Notifications History</h2>
    <button class="btn-primary" onclick="loadNotificationsTable()">&#8635; Refresh Notifications</button>
  </div>

  <!-- Standardized Filter Bar (Part III.1) + Reference Logic -->
  <div class="filter-wrapper">
    <input type="text" id="notif-filter-search" class="filter-input" placeholder="Search by message or event..." onkeyup="applyNotificationsFilters()">
    
    <button class="btn-filter-toggle" onclick="toggleFilter('notif-adv')">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      Filters
    </button>
  
    <div id="notif-adv" class="filter-advanced">
      <!-- Status Radio Logic (Per Reference Code) -->
      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('notif-status-drop')">Status ▼</button>
        <div class="dropdown-content" id="notif-status-drop">
          <label><input type="radio" name="notif-filter-status" value="All" checked onchange="applyNotificationsFilters()"> All</label>
          <label><input type="radio" name="notif-filter-status" value="Unread" onchange="applyNotificationsFilters()"> Unread</label>
          <label><input type="radio" name="notif-filter-status" value="Read" onchange="applyNotificationsFilters()"> Read</label>
        </div>
      </div>

      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('notif-module-drop')">Module ▼</button>
        <div class="dropdown-content" id="notif-module-drop">
          <label><input type="checkbox" class="notif-filter-mod-cb" value="Clients" checked onchange="applyNotificationsFilters()"> Clients</label>
          <label><input type="checkbox" class="notif-filter-mod-cb" value="Users" checked onchange="applyNotificationsFilters()"> Users</label>
          <label><input type="checkbox" class="notif-filter-mod-cb" value="Settings" checked onchange="applyNotificationsFilters()"> Settings</label>
          <label><input type="checkbox" class="notif-filter-mod-cb" value="System" checked onchange="applyNotificationsFilters()"> System</label>
        </div>
      </div>

      <!-- RESTORED: Category Filter (Per Reference Code) -->
      <div class="custom-dropdown">
        <button class="dropdown-btn" onclick="toggleDropdown('notif-category-drop')">Category ▼</button>
        <div class="dropdown-content" id="notif-category-drop">
          <label><input type="checkbox" class="notif-filter-cat-cb" value="New Client" checked onchange="applyNotificationsFilters()"> New Client</label>
          <label><input type="checkbox" class="notif-filter-cat-cb" value="New User" checked onchange="applyNotificationsFilters()"> New User</label>
          <label><input type="checkbox" class="notif-filter-cat-cb" value="User Birthday" checked onchange="applyNotificationsFilters()"> User Birthday</label>
          <label><input type="checkbox" class="notif-filter-cat-cb" value="User Anniversary" checked onchange="applyNotificationsFilters()"> User Anniversary</label>
          <label><input type="checkbox" class="notif-filter-cat-cb" value="Client Anniversary" checked onchange="applyNotificationsFilters()"> Client Anniversary</label>
        </div>
      </div>

      <!-- Red Ghost Reset Button (Part III.1 Mandate) -->
      <button type="button" class="btn-reset-filters" onclick="resetNotificationsFilters()">Reset</button>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th style="width: 50px; text-align: center;">Status</th>
          <th class="sortable" onclick="handleNotificationsSort('time')" style="width: 150px;">Date/Time <span id="nsort-time" class="sort-icon"></span></th>
          <th class="sortable" onclick="handleNotificationsSort('module')" style="width: 120px;">Module <span id="nsort-module" class="sort-icon"></span></th>
          <th style="width: 150px;">Category</th>
          <th>Message</th>
          <th>Recipient</th>
        </tr>
      </thead>
      <tbody id="fullNotificationsTableBody">
        <tr><td colspan="6" style="text-align:center; padding: 30px;">Loading notifications...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Header Popup Container (Injected via Plugin) -->
<div id="notif-popup" class="header-popup" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
    <h4 style="margin:0;">Notifications</h4>
    <span id="notif-mark-all" style="font-size:11px; color:var(--brand-primary); cursor:pointer; font-weight:600;" onclick="markAllNotificationsAsRead()">Mark all as read</span>
  </div>
  <div id="notif-scroll-box" style="max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; border-bottom: 1px solid #eee;">
    <p style="font-size: 12px; color: #888; padding: 20px; text-align: center;">No new notifications.</p>
  </div>
  <button onclick="openNotificationsPage()" style="width:100%; padding:10px; background:none; border:none; color:var(--brand-primary); cursor:pointer; font-weight:bold; font-size: 13px; margin-top:10px;">View All Notifications</button>
</div>

<script>
  /* ========================================================================
     1. GLOBAL STATE & PLUGIN INIT
     ======================================================================== */
  var GLOBAL_NOTIF_DATA = [];
  var CURRENT_NOTIF_SORT_COLUMN = 'time';
  var CURRENT_NOTIF_SORT_DESC = true;

  /**
   * PLUGIN INIT: Triggered by Index.html on DOM ready.
   */
  function initNotificationsPlugin() {
    if (INSTALLED_PLUGINS.includes('NotifBell')) {
      fetchNotifications();
      setInterval(fetchNotifications, 300000); // 5 mins
    }
  }

  /* ========================================================================
     2. DIRECTORY: FETCHING, FILTERING & SORTING
     ======================================================================== */

  function loadNotificationsTable() {
    var tbody = document.getElementById('fullNotificationsTableBody');
    if (tbody) tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px;">Loading data...</td></tr>';
    
    google.script.run.withSuccessHandler(function(notifs) {
      GLOBAL_NOTIF_DATA = notifs || [];
      applyNotificationsFilters();
    }).getMyNotifications(150, false); 
  }

  function handleNotificationsSort(column) {
    if (CURRENT_NOTIF_SORT_COLUMN === column) {
      CURRENT_NOTIF_SORT_DESC = !CURRENT_NOTIF_SORT_DESC;
    } else {
      CURRENT_NOTIF_SORT_COLUMN = column;
      CURRENT_NOTIF_SORT_DESC = false;
    }
    applyNotificationsFilters();
  }

  function resetNotificationsFilters() {
    document.getElementById('notif-filter-search').value = '';
    document.querySelectorAll('.notif-filter-mod-cb').forEach(cb => cb.checked = true);
    document.querySelectorAll('.notif-filter-cat-cb').forEach(cb => cb.checked = true);
    var allRadio = document.querySelector('input[name="notif-filter-status"][value="All"]');
    if (allRadio) allRadio.checked = true;
    applyNotificationsFilters();
  }

  function applyNotificationsFilters() {
    var search = document.getElementById('notif-filter-search').value.toLowerCase();
    var checkedModules = Array.from(document.querySelectorAll('.notif-filter-mod-cb:checked')).map(cb => cb.value);
    var checkedCategories = Array.from(document.querySelectorAll('.notif-filter-cat-cb:checked')).map(cb => cb.value);
    var statusEl = document.querySelector('input[name="notif-filter-status"]:checked');
    var statusFilter = statusEl ? statusEl.value : "All";

    var filtered = GLOBAL_NOTIF_DATA.filter(function(n) {
      var matchesSearch = (n.message || "").toLowerCase().includes(search) || (n.event || "").toLowerCase().includes(search);
      var matchesModule = checkedModules.length === 0 || checkedModules.includes((n.module || "").trim());
      var matchesCategory = checkedCategories.length === 0 || checkedCategories.includes((n.category || "").trim()) || checkedCategories.includes((n.event || "").trim());
      var matchesStatus = (statusFilter === "All") || 
                        (statusFilter === "Unread" && !n.isRead) || 
                        (statusFilter === "Read" && n.isRead);
      
      return matchesSearch && matchesModule && matchesCategory && matchesStatus;
    });

    filtered.sort(function(a, b) {
      var valA = String(a[CURRENT_NOTIF_SORT_COLUMN] || "").toLowerCase();
      var valB = String(b[CURRENT_NOTIF_SORT_COLUMN] || "").toLowerCase();
      if (CURRENT_NOTIF_SORT_COLUMN === 'time') {
        valA = new Date(a.time).getTime();
        valB = new Date(b.time).getTime();
      }
      if (valA < valB) return CURRENT_NOTIF_SORT_DESC ? 1 : -1;
      if (valA > valB) return CURRENT_NOTIF_SORT_DESC ? -1 : 1;
      return 0;
    });

    // Update sort icons
    document.querySelectorAll('.sort-icon').forEach(icon => { if(icon.id.startsWith('nsort-')) icon.innerHTML = ''; });
    var iconEl = document.getElementById('nsort-' + CURRENT_NOTIF_SORT_COLUMN);
    if (iconEl) iconEl.innerHTML = CURRENT_NOTIF_SORT_DESC ? '▼' : '▲';

    renderNotificationsTableRows(filtered);
  }

  function renderNotificationsTableRows(notifs) {
    var tbody = document.getElementById('fullNotificationsTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    
    if (notifs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px;">No notifications match your filters.</td></tr>';
      return;
    }

    notifs.forEach(function(n) {
      var rowClass = n.isRead ? "" : "full-notif-unread";
      var dotColor = n.isRead ? "#ccc" : "var(--brand-primary)";
      
      var tr = document.createElement('tr');
      tr.className = rowClass;
      tr.setAttribute('data-row', n.row);
      tr.style.borderBottom = "1px solid #eee";
      
      tr.innerHTML = `
        <td style="padding: 15px; text-align: center;">
          <div class="status-dot" style="width: 10px; height: 10px; border-radius: 50%; background-color: ${dotColor}; margin: 0 auto;"></div>
        </td>
        <td style="padding: 15px; font-size: 13px; color: #777; white-space: nowrap;">${n.time}</td>
        <td style="padding: 15px; font-size: 13px; font-weight: bold;">${n.module}</td>
        <td style="padding: 15px; font-size: 13px; color: #555;">
          <span class="badge" style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px;">${n.category || n.event}</span>
        </td>
        <td style="padding: 15px; font-size: 14px; line-height: 1.4;">${n.message}</td>
        <td style="padding: 15px; font-size: 13px; color: #888;">${n.recipient || "All"}</td>
      `;
      tbody.appendChild(tr);
    });

    setupFullNotificationObserver();
  }

  /* ========================================================================
     3. HEADER POPUP & INTERACTION LOGIC
     ======================================================================== */

  function fetchNotifications() {
    if (!INSTALLED_PLUGINS.includes('NotifBell')) return;
    
    google.script.run.withSuccessHandler(function(notifs) {
      var unreadCount = 0;
      var scrollBox = document.getElementById('notif-scroll-box');
      if (!scrollBox) return;

      if (!notifs || notifs.length === 0) {
        scrollBox.innerHTML = '<p style="font-size: 12px; color: #888; padding: 20px; text-align: center;">No notifications.</p>';
      } else {
        var html = '';
        notifs.forEach(function(n) {
          if (!n.isRead) unreadCount++;
          html += `
            <div class="notif-item ${n.isRead ? '' : 'notif-unread'}" data-row="${n.row}">
              <div style="font-weight: 600; font-size: 12px; color: var(--brand-primary); margin-bottom: 2px;">${n.module} &bull; ${n.category || n.event}</div>
              <div style="font-size: 13px; color: #333; line-height:1.4;">${n.message}</div>
              <div style="font-size: 11px; color: #999; margin-top: 6px;">${n.time}</div>
            </div>`;
        });
        scrollBox.innerHTML = html;
        setupNotificationObserver();
      }

      var badge = document.getElementById('notif-badge');
      if (badge) {
        badge.innerText = unreadCount;
        badge.style.display = unreadCount > 0 ? 'block' : 'none';
      }
    }).getMyNotifications(15, true); 
  }

  function setupNotificationObserver() {
    var scrollBox = document.getElementById('notif-scroll-box');
    var unreadItems = scrollBox.querySelectorAll('.notif-unread');
    if (unreadItems.length === 0) return;

    var observer = new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var el = entry.target;
          var rowIndex = el.getAttribute('data-row');
          google.script.run.withSuccessHandler(function() {
            el.classList.remove('notif-unread');
            var badge = document.getElementById('notif-badge');
            if (badge) {
              var count = parseInt(badge.innerText) - 1;
              badge.innerText = Math.max(0, count);
              if (count <= 0) badge.style.display = 'none';
            }
          }).markNotificationAsRead(rowIndex);
          obs.unobserve(el);
        }
      });
    }, { root: scrollBox, threshold: 0.8 });
    unreadItems.forEach(function(item) { observer.observe(item); });
  }

  function setupFullNotificationObserver() {
    var unreadRows = document.querySelectorAll('.full-notif-unread');
    if (unreadRows.length === 0) return;

    var observer = new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var row = entry.target;
          var rowIndex = row.getAttribute('data-row');
          google.script.run.markNotificationAsRead(rowIndex);
          row.classList.remove('full-notif-unread');
          var dot = row.querySelector('.status-dot');
          if (dot) dot.style.backgroundColor = '#ccc';
          obs.unobserve(row);
          var badge = document.getElementById('notif-badge');
          if (badge) {
            var count = parseInt(badge.innerText) - 1;
            badge.innerText = Math.max(0, count);
            if (count <= 0) badge.style.display = 'none';
          }
        }
      });
    }, { threshold: 0.5 });
    unreadRows.forEach(function(row) { observer.observe(row); });
  }

  function markAllNotificationsAsRead() {
    google.script.run.withSuccessHandler(function() {
      fetchNotifications();
      if (document.getElementById('notificationsListView').style.display === 'block') {
        loadNotificationsTable();
      }
    }).markAllMyNotificationsAsRead();
  }

  function openNotificationsPage() {
    var popup = document.getElementById('notif-popup');
    if (popup) popup.style.display = 'none'; 
    switchView('notificationsListView'); 
    loadNotificationsTable();
  }
</script>
