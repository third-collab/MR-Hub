<style>
  /* ==========================================================================
     SPARKHUB GLOBAL CSS BASELINE
     Native Identity: Electric Indigo, Bright Cyan, Midnight Slate
     ========================================================================== */

  :root { 
    /* CORE SPARKHUB PALETTE */
    --brand-primary: #6366F1;   /* Electric Indigo */
    --brand-accent: #06B6D4;    /* Bright Cyan */
    --brand-dark: #0F172A;      /* Midnight Slate */
    
    --brand-white: #FFFFFF; 
    --brand-offwhite: #F8FAFC; 
    
    /* SYSTEM BORDERS & SHADOWS */
    --border-radius-large: 12px; 
    --border-radius-small: 6px; 
    --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }
  
  body { 
    font-family: 'Inter', 'Segoe UI', sans-serif; 
    background-color: var(--brand-offwhite); 
    color: #334155; 
    margin: 0; padding: 0; 
    position: relative; 
    overflow-x: hidden; 
  }

  /* ==========================================================================
     LAYOUT & CONTAINERS
     ========================================================================== */
     
  .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
  
  .form-wrapper {
    background: var(--brand-white);
    border-radius: var(--border-radius-large);
    padding: 30px;
    box-shadow: var(--shadow-soft);
    border: 1px solid #e2e8f0;
  }

  .view-header-bar {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 15px;
    margin-bottom: 20px;
  }
  .view-header-bar h2 { margin: 0; color: var(--brand-dark); font-weight: 700; }

  /* ==========================================================================
     HEADER & NAVIGATION (APP BAR)
     ========================================================================== */
     
  .header { 
    background-color: var(--brand-dark); 
    color: var(--brand-white); 
    padding: 16px 40px; 
    box-shadow: var(--shadow-soft); 
    display: flex; justify-content: space-between; 
    align-items: center; position: sticky; top: 0; width: 100%; box-sizing: border-box; z-index: 1000;
  }
  
  .header-logo { display: flex; align-items: center; }
  .header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  
  .header-right { display: flex; align-items: center; gap: 20px; }
  .header-tools { display: flex; align-items: center; gap: 15px; }
  .header-clock { font-size: 13px; color: #cbd5e1; cursor: pointer; transition: color 0.2s; }
  .header-clock:hover { color: var(--brand-white); }
  .header-icon { cursor: pointer; color: #cbd5e1; transition: color 0.2s; }
  .header-icon:hover { color: var(--brand-accent); }
  
  .notif-badge {
    position: absolute; top: -6px; right: -8px;
    background-color: var(--brand-primary); color: white;
    font-size: 10px; font-weight: bold; padding: 2px 6px;
    border-radius: 10px; display: none; border: 2px solid var(--brand-dark);
  }

  .header-user-pill {
    display: flex; align-items: center; font-size: 14px; font-weight: 600; 
    background-color: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 30px; 
    cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05);
  }
  .header-user-pill:hover { background-color: rgba(255,255,255,0.2); }

  .header-popup { 
    display: none; position: fixed !important; top: 65px !important; right: 40px !important; 
    width: 280px; background: white; color: #333; padding: 15px; border-radius: var(--border-radius-large); 
    box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 99999 !important; border: 1px solid #e2e8f0;
  }

  /* ==========================================================================
     DASHBOARD CARDS
     ========================================================================== */
     
  .module-group-title { 
    font-size: 15px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-top: 40px; margin-bottom: 20px; 
  }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .card { 
    background-color: var(--brand-white); border-radius: var(--border-radius-large); 
    padding: 24px; box-shadow: var(--shadow-soft); border: 1px solid #e2e8f0;
    cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: var(--brand-primary); }
  .card.disabled { opacity: 0.6; cursor: not-allowed; }
  .card.disabled:hover { transform: none; box-shadow: var(--shadow-soft); border-color: #e2e8f0; }
  .card-icon { width: 28px; height: 28px; margin-bottom: 16px; color: var(--brand-primary); display: block; }
  .card h3 { margin: 0 0 8px 0; font-size: 18px; color: var(--brand-dark); }
  .card p { margin: 0; color: #64748b; line-height: 1.5; font-size: 13px; }

  /* ==========================================================================
     FILTER BAR & DROPDOWNS
     ========================================================================== */
     
  .filter-wrapper { 
    display: flex; align-items: center; gap: 12px; background: var(--brand-white); 
    padding: 12px 16px; border-radius: var(--border-radius-large); box-shadow: var(--shadow-soft); 
    margin-bottom: 20px; overflow: visible; white-space: nowrap; flex-wrap: wrap; border: 1px solid #e2e8f0;
  }
  .filter-input { 
    flex: 1; min-width: 200px; padding: 10px 14px; border-radius: var(--border-radius-small); 
    border: 1px solid #e2e8f0; font-family: inherit; font-size: 14px; outline: none; transition: 0.2s;
  }
  .filter-input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
  
  .btn-filter-toggle { 
    background: #f8fafc; color: #334155; border: 1px solid #e2e8f0; padding: 10px 16px; 
    border-radius: var(--border-radius-small); font-weight: 600; font-size: 13px; 
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; flex-shrink: 0; 
  }
  .btn-filter-toggle:hover { background: #e2e8f0; color: var(--brand-dark); }
  
  .filter-advanced { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .custom-dropdown { position: relative; display: inline-block; }
  .dropdown-btn { 
    background-color: #f8fafc; color: #334155; border: 1px solid #e2e8f0; 
    padding: 10px 14px; border-radius: var(--border-radius-small); font-size: 13px; 
    cursor: pointer; font-weight: 500; font-family: inherit; transition: 0.2s;
  }
  .dropdown-btn:hover { background-color: #e2e8f0; }
  .dropdown-content { 
    display: none; position: absolute; background-color: var(--brand-white); 
    min-width: 200px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: var(--border-radius-small); 
    padding: 10px; z-index: 100; top: calc(100% + 5px); border: 1px solid #e2e8f0;
  }
  .dropdown-content.show { display: flex; flex-direction: column; gap: 8px; }
  .dropdown-content label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; color: #475569; }

  /* ==========================================================================
     TABLES & DATAGRIDS
     ========================================================================== */
     
  .table-container { 
    background: var(--brand-white); border-radius: var(--border-radius-large); 
    box-shadow: var(--shadow-soft); overflow-x: auto; border: 1px solid #e2e8f0;
  }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
  th { 
    background-color: #f8fafc; color: #475569; font-weight: 600; 
    text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; 
  }
  th.sortable { cursor: pointer; user-select: none; transition: background 0.2s; }
  th.sortable:hover { background-color: #e2e8f0; color: var(--brand-dark); }
  .sort-icon { font-size: 10px; margin-left: 4px; color: var(--brand-primary); }
  tr:hover td { background-color: #f8fafc; }

  /* ==========================================================================
     BUTTONS & BADGES
     ========================================================================== */
     
  .btn-primary { 
    padding: 10px 20px; background-color: var(--brand-primary); color: var(--brand-white); 
    border: none; border-radius: var(--border-radius-small); font-weight: 600; 
    font-size: 14px; cursor: pointer; transition: 0.2s; font-family: inherit; display: inline-block;
  }
  .btn-primary:hover { background-color: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
  .btn-primary:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
  
  .btn-edit { 
    background-color: var(--brand-accent); color: var(--brand-dark); border: none; 
    padding: 6px 14px; border-radius: var(--border-radius-small); cursor: pointer; 
    font-size: 13px; font-weight: 600; transition: 0.2s; 
  }
  .btn-edit:hover { background-color: #0891b2; color: white; }
  
  .btn-dash-back { 
    background: none; border: none; color: #64748b; cursor: pointer; 
    font-size: 14px; font-weight: 600; padding: 0; margin-bottom: 20px; transition: 0.2s; 
  }
  .btn-dash-back:hover { color: var(--brand-primary); }
  
  .btn-add-row {
    background: transparent; border: 1px dashed var(--brand-primary); color: var(--brand-primary);
    padding: 8px 16px; border-radius: var(--border-radius-small); cursor: pointer;
    font-size: 13px; font-weight: 600; transition: 0.2s;
  }
  .btn-add-row:hover { background: rgba(99, 102, 241, 0.05); }

  .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
  .badge-active { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
  .badge-inactive { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
  .badge-onboarding { background-color: #e0e7ff; color: #4338ca; border: 1px solid #c7d2fe; }
  .badge-paused { background-color: #fef9c3; color: #a16207; border: 1px solid #fef08a; }

  /* ==========================================================================
     FORMS, INPUTS & ACCORDIONS
     ========================================================================== */

  .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 15px; }
  .form-group { flex: 1; min-width: 250px; display: flex; flex-direction: column; }
  .form-group label { margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #475569; }
  
  .form-control { 
    padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: var(--border-radius-small); 
    font-family: inherit; font-size: 14px; transition: 0.2s; background: #fff; color: #334155;
  }
  .form-control:focus { border-color: var(--brand-primary); outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
  .form-control:read-only { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; }

  .accordion { 
    background-color: #f8fafc; color: var(--brand-dark); cursor: pointer; padding: 16px 20px; 
    width: 100%; border: 1px solid #e2e8f0; border-radius: var(--border-radius-small); 
    text-align: left; outline: none; font-size: 15px; font-weight: 700; transition: 0.2s; 
    margin-top: 15px; display: flex; justify-content: space-between; align-items: center;
  }
  .accordion:after { content: '\002B'; font-weight: bold; color: #94a3b8; font-size: 20px; }
  .accordion.active { background-color: var(--brand-primary); color: white; border-color: var(--brand-primary); }
  .accordion.active:after { content: "\2212"; color: white; }
  
  .panel { padding: 20px; display: none; background-color: white; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 var(--border-radius-small) var(--border-radius-small); }
  
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; }
  .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #475569; cursor: pointer; }

  .status-msg { margin-top: 15px; font-weight: bold; text-align: right; font-size: 14px; }

  /* ==========================================================================
     TABS (VIEW PROFILE)
     ========================================================================== */
     
  .tab-nav { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; overflow-x: auto; }
  .tab-btn { 
    background: none; border: none; padding: 12px 20px; cursor: pointer; 
    font-size: 14px; font-weight: 600; color: #64748b; border-bottom: 3px solid transparent; 
    transition: 0.2s; white-space: nowrap; 
  }
  .tab-btn:hover { color: var(--brand-primary); }
  .tab-btn.active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); }
  .tab-content { display: none; animation: fadeEffect 0.3s; }
  @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }

  /* ==========================================================================
     WIDGETS: CALENDAR & NOTIFICATIONS
     ========================================================================== */

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .cal-day-header { font-size: 11px; font-weight: bold; color: #94a3b8; padding-bottom: 5px; }
  .cal-day { font-size: 12px; padding: 6px; border-radius: 4px; cursor: default; color: #334155; }
  .cal-today { background-color: var(--brand-primary); color: white; font-weight: bold; }
  
  .notif-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
  .notif-item:last-child { border-bottom: none; }
  .notif-item:hover { background-color: #f8fafc; }
  .notif-unread { border-left: 3px solid var(--brand-primary); background-color: #eff6ff; }
  .notif-unread:hover { background-color: #e0e7ff; }

</style>
